<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperBButter - The Underground Syndicate</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-base: #050505; --bg-dark: #121212; --bg-card: #1a1a1a;
    --red-main: #C91818; --red-glow: rgba(201, 24, 24, 0.4);
    --text-main: #F5F5F5; --text-muted: #A3A3A3; --white: #FFFFFF;
    --transition: 0.3s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; scroll-behavior: smooth; }
body { background-color: var(--bg-base); background-image: radial-gradient(circle at 50% 0%, #1a0505 0%, #050505 80%); background-attachment: fixed; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
.no-save { -webkit-touch-callout: none; user-select: none; -webkit-user-drag: none; }

::-webkit-scrollbar { display: none; } 
* { -ms-overflow-style: none; scrollbar-width: none; } 

/* UI Elements */
.top-btn { position: absolute; top: 15px; padding: 6px 14px; border-radius: 4px; font-size: 12px; transition: var(--transition); z-index: 50; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.back-to-bakery { left: 15px; color: var(--text-muted); text-decoration: none; background: rgba(255,255,255,0.05); border: 1px solid #333; }
.back-to-bakery:hover { color: var(--white); border-color: var(--white); background: rgba(255,255,255,0.1); }
.edit-mode-toggle { right: 15px; background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); }
.edit-mode-toggle.active { background: var(--red-main); color: var(--white); border-color: var(--red-main); box-shadow: 0 0 10px var(--red-glow); }

/* Control Buttons (Edit Mode) */
.btn-control { display: none !important; position: absolute; z-index: 30; background: rgba(0,0,0,0.8); border: 1px solid var(--red-main); color: var(--white); border-radius: 4px; padding: 4px; cursor: pointer; transition: 0.2s; align-items: center; justify-content: center; }
body.is-editing .btn-control, body.is-editing .btn-add-gang, body.is-editing .btn-add-member { display: flex !important; }

.btn-delete { top: -5px; left: -5px; width: 24px; height: 24px; border-radius: 50%; background: var(--red-main); font-size: 10px; font-weight: bold; }
.btn-move-l { bottom: 35px; left: -5px; }
.btn-move-r { bottom: 35px; right: -5px; }
.btn-move-u { top: 10px; right: 40px; }
.btn-move-d { top: 10px; right: 80px; }

header { width: 100%; text-align: center; padding: 60px 15px 20px; border-bottom: 1px solid rgba(201, 24, 24, 0.2); background: linear-gradient(180deg, rgba(18,18,18,0.9) 0%, rgba(5,5,5,0) 100%); position: relative; }
h1 { font-size: 26px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
h1 span { color: var(--red-main); }

.nav-bar { width: 95%; max-width: 600px; display: flex; justify-content: center; gap: 10px; margin: 20px auto 0; background: var(--bg-dark); padding: 5px; border-radius: 8px; border: 1px solid #333; }
.nav-item { padding: 10px 20px; color: var(--text-muted); font-size: 14px; cursor: pointer; border-radius: 4px; transition: var(--transition); width: 50%; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
.nav-item.active { background: rgba(201, 24, 24, 0.1); color: var(--red-main); font-weight: 500; }

.container { width: 100%; max-width: 600px; padding: 20px 15px 50px; }
.page { display: none; animation: fadeIn 0.4s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Directory List */
.directory-container { margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 10px; }
.warp-btn { background: var(--bg-dark); border: 1px solid #333; color: var(--white); padding: 12px 15px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; font-size: 14px; }
.warp-btn:hover { border-color: var(--red-main); background: rgba(201, 24, 24, 0.05); transform: translateX(5px); }

/* Gang Cards */
.gang-card { background: var(--bg-card); border-radius: 8px; padding: 20px; margin-bottom: 25px; border: 1px solid #333; position: relative; transition: 0.3s; }
.gang-header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; position: relative; padding-right: 120px; }
.gang-name { font-size: 20px; color: var(--white); margin-bottom: 5px; }
.gang-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
.gang-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.tag { font-size: 10px; background: rgba(255,255,255,0.05); color: #bbb; padding: 4px 8px; border-radius: 12px; border: 1px solid #444; }

.btn-add-gang, .btn-add-member { background: transparent; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.3s; width: 100%; justify-content: center; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); border: 1px dashed #444; }
.btn-add-gang:hover { border-color: var(--white); color: var(--white); }
.btn-add-member { background: rgba(201, 24, 24, 0.05); border: 1px dashed var(--red-main); color: var(--red-main); margin-top: 15px; }
.btn-add-member:hover { background: var(--red-main); color: var(--white); }

.members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px; margin-top: 15px; }
.member-item { text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
.member-img-wrapper { width: 100%; padding-top: 100%; border-radius: 4px; background: #000; position: relative; overflow: hidden; border: 1px solid #444; }
.member-img-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%); transition: 0.3s; }
.member-badge { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.8); color: var(--red-main); font-size: 9px; padding: 2px 5px; border: 1px solid var(--red-main); border-radius: 2px; z-index: 2; font-weight: bold; }
.member-name { font-size: 12px; color: var(--text-main); margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Watermark */
.watermark-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; pointer-events: none; z-index: 1; }

/* Modals */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; padding: 15px; backdrop-filter: blur(5px); }
.modal-content { background: var(--bg-card); width: 95%; max-width: 400px; border-radius: 8px; border: 1px solid #333; position: relative; max-height: 90vh; overflow-y: auto; animation: fadeIn 0.3s ease; padding: 20px; }
.modal-content.profile { padding: 0; border-color: var(--red-main); }
.modal-close { position: absolute; top: 10px; right: 15px; color: var(--text-muted); font-size: 24px; cursor: pointer; z-index: 10; transition: 0.2s; }

.form-input { width: 100%; padding: 10px; margin-bottom: 12px; background: var(--bg-dark); border: 1px solid #333; color: var(--text-main); border-radius: 4px; font-size: 13px; outline: none; }
.btn-submit { width: 100%; background: var(--red-main); color: var(--white); padding: 10px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; transition: 0.3s; font-weight: 500; }

/* Avatar Preview UI */
.avatar-preview-box { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #444; background: #000; margin: 0 auto 15px; position: relative; overflow: hidden; }
.avatar-preview-box img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

  <a href="index.html" class="top-btn back-to-bakery">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    กลับเบเกอรี่
  </a>
  
  <button class="top-btn edit-mode-toggle" id="editToggleBtn" onclick="toggleEditMode()">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    โหมดแก้ไข
  </button>

  <header>
    <h1>Underground <span>Syndicate</span></h1>
    <nav class="nav-bar">
      <div class="nav-item active" onclick="switchTab('setting', this)">Setting</div>
      <div class="nav-item" onclick="switchTab('gangs', this)">Factions</div>
    </nav>
  </header>

  <div class="container">
    <div id="setting" class="page active">
      <div class="gang-card" style="border-left: 4px solid var(--red-main); text-align: center;">
        <div style="font-size: 16px; font-style: italic; color: var(--white); margin-bottom: 15px;">"เบื้องหน้าคือความหอมหวาน เบื้องหลังคือการนองเลือด"</div>
        <div id="warp-list" class="directory-container"></div>
      </div>
    </div>

    <div id="gangs" class="page">
      <button class="btn-add-gang" onclick="openModal('addGangModal')">+ เพิ่มแก๊งใหม่</button>
      <div id="gangs-container"></div>
    </div>
  </div>

  <div class="modal-overlay" id="addMemberModal" onclick="closeModal(event, 'addMemberModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal(event, 'addMemberModal', true)">&times;</span>
        <h2 style="margin-bottom: 15px; font-size: 18px;">เพิ่มสมาชิก <span id="target-gang-name" style="color:var(--red-main)"></span></h2>
        <div class="avatar-preview-box">
            <img id="m-preview-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="preview">
            <div id="m-preview-watermark" class="watermark-overlay"></div>
        </div>
        <div class="zoom-slider-container">
            <div class="slider-row"><span>🔍 ซูม:</span> <input type="range" id="m-zoom-slider" min="1" max="3" step="0.1" value="1" oninput="updatePreviewImageStyle('m')"></div>
            <div class="slider-row"><span>↔️ X:</span> <input type="range" id="m-pos-x-slider" min="0" max="100" value="50" oninput="updatePreviewImageStyle('m')"></div>
            <div class="slider-row"><span>↕️ Y:</span> <input type="range" id="m-pos-y-slider" min="0" max="100" value="50" oninput="updatePreviewImageStyle('m')"></div>
        </div>
        <input type="text" id="m-name-input" class="form-input" placeholder="ชื่อพนักงาน..." oninput="filterCharacters('m')">
        <div id="autocomplete-list-m" class="autocomplete-list"></div>
        <input type="text" id="m-new-role" class="form-input" placeholder="บทบาท">
        <input type="text" id="m-new-badge" class="form-input" placeholder="Badge">
        <input type="text" id="m-new-img" class="form-input" placeholder="ลิงก์รูป" oninput="updatePreviewImageStyle('m')">
        <button class="btn-submit" onclick="submitNewMember()">บันทึกสมาชิก</button>
    </div>
  </div>

  <script>
const API_URL = "https://script.google.com/macros/s/AKfycbz7_u5Xd9uXGiBswifeqw5Q0hefHI_ckMJVwHGEFL6SdJJ4FHViQBKNM0OhvT6EnA9DDA/exec";
const WATERMARK_URL = "https://drive.google.com/thumbnail?id=1e3zyO1VT4FCB020UAEmq5fOThW2R38SL&sz=w1000";

let bakeryData = [];
let mafiaData = [];

document.addEventListener("DOMContentLoaded", () => {
    loadMafiaData();
    fetchBakeryData();
});

async function loadMafiaData() {
    const container = document.getElementById('gangs-container');
    container.innerHTML = '<div class="loading-text">กำลังดึงข้อมูล...</div>';
    try {
        const res = await fetch(API_URL + "?sheet=Mafia");
        mafiaData = await res.json();
        renderGangs(mafiaData);
    } catch (e) { container.innerHTML = "Error โหลดข้อมูล"; }
}

async function fetchBakeryData() {
    try {
        const res = await fetch(API_URL + "?sheet=Bakery");
        bakeryData = await res.json();
    } catch(e) {}
}

function renderGangs(data) {
    const container = document.getElementById('gangs-container');
    const warpList = document.getElementById('warp-list');
    container.innerHTML = ''; warpList.innerHTML = '';

    const gangs = [...new Set(data.filter(i => i.Category === 'Gangs').map(i => i.GroupName))];
    
    gangs.forEach((gn, idx) => {
        // Warp Link
        warpList.innerHTML += `<a href="#" class="warp-btn" onclick="warpToGang(${idx})">${gn} <span>➜</span></a>`;

        const mems = data.filter(i => i.GroupName === gn && i.NameMafia !== "[GANG_INFO]");
        const info = data.find(i => i.GroupName === gn && i.NameMafia === "[GANG_INFO]");

        let memsHTML = mems.map(i => {
            const name = i.NameMafia.replace(/'/g,"\\'");
            return `
            <div class="member-item" onclick="handleMemberClick(event, '${name}')">
                <button class="btn-control btn-move-l" onclick="event.stopPropagation(); moveItem('${name}', -1)">
                    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="white" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button class="btn-control btn-move-r" onclick="event.stopPropagation(); moveItem('${name}', 1)">
                    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="white" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <button class="btn-control btn-delete" onclick="event.stopPropagation(); deleteItem('${name}')">✖</button>
                
                <div class="member-img-wrapper">
                    ${i.Badge ? `<span class="member-badge">${i.Badge}</span>` : ""}
                    <img src="${formatImageUrl(i.ImageURL)}" style="transform: scale(${i.ZoomLevel || 1}); transform-origin: ${i.PosX || 50}% ${i.PosY || 50}%">
                    ${i.UseWatermark === "TRUE" ? `<div class="watermark-overlay" style="background-image: url('${WATERMARK_URL}')"></div>` : ""}
                </div>
                <div class="member-name">${i.NameMafia}</div>
            </div>`;
        }).join('');

        container.innerHTML += `
            <div class="gang-card" id="gang-${idx}">
                <button class="btn-control btn-move-u" onclick="moveItem('[GANG_INFO]', -1, '${gn}')">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="white" stroke-width="3"><path d="M18 15l-6-6-6 6"/></svg>
                </button>
                <button class="btn-control btn-move-d" onclick="moveItem('[GANG_INFO]', 1, '${gn}')">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="white" stroke-width="3"><path d="M18 9l-6 6-6-6"/></svg>
                </button>
                <div class="gang-header">
                    <h2 class="gang-name">${gn}</h2>
                    <p class="gang-desc">${info?.GangDesc || ""}</p>
                </div>
                <div class="members-grid">${memsHTML}</div>
                <button class="btn-add-member" onclick="prepAddMember('${gn}')">+ เพิ่มสมาชิก</button>
            </div>`;
    });
}

// 🌟 ฟังก์ชันจัดการตำแหน่ง 🌟
async function moveItem(name, direction, gangName = null) {
    // ถ้าย้ายแก๊ง ต้องใช้ชื่อ NameMafia เป็น [GANG_INFO] และระบุ GroupName
    const payload = {
        action: "move",
        sheet: "Mafia",
        name: name,
        direction: direction,
        // เพิ่มเติมเพื่อให้สคริปต์หาแถวเจอในกรณีชื่อซ้ำแต่คนละแก๊ง (ถ้าสคริปต์รองรับ)
    };
    await sendRequest(payload);
}

// 🌟 ฟังก์ชันซ่อมปุ่มเพิ่มสมาชิก 🌟
async function submitNewMember() {
    const name = document.getElementById('m-name-input').value;
    if(!name) return;
    const data = {
        Category: "Gangs", GroupName: currentAddingGang, NameMafia: name,
        Role: document.getElementById('m-new-role').value,
        Badge: document.getElementById('m-new-badge').value,
        ImageURL: document.getElementById('m-new-img').value,
        ZoomLevel: document.getElementById('m-zoom-slider').value,
        PosX: document.getElementById('m-pos-x-slider').value,
        PosY: document.getElementById('m-pos-y-slider').value,
        UseWatermark: "TRUE"
    };
    closeModal(null, 'addMemberModal', true);
    await sendRequest({ action: "add", sheet: "Mafia", data });
}

async function sendRequest(payload) {
    document.body.style.opacity = "0.5";
    await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
    await loadMafiaData();
    document.body.style.opacity = "1";
}

function formatImageUrl(url) {
    if(!url) return "";
    const id = url.match(/\/file\/d\/([^\/]+)/) || url.match(/id=([^&]+)/);
    return id ? `https://drive.google.com/thumbnail?id=${id[1]}&sz=w1000` : url;
}

function toggleEditMode() {
    document.body.classList.toggle('is-editing');
    document.getElementById('editToggleBtn').classList.toggle('active');
}

function warpToGang(id) {
    switchTab('gangs', document.querySelectorAll('.nav-item')[1]);
    setTimeout(() => {
        window.scrollTo({ top: document.getElementById('gang-'+id).offsetTop - 80, behavior: 'smooth' });
    }, 200);
}

function switchTab(t, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(t).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(e, id, force=false) { if(force || e.target.id === id) document.getElementById(id).style.display='none'; }
</script>
</body>
</html>
