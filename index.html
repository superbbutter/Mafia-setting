<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperBButter - Syndicate Database</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-base: #080808; 
    --bg-dark: #121212; 
    --bg-card: #181818;
    --red-main: #E50914; 
    --red-glow: rgba(229, 9, 20, 0.4);
    --text-main: #F5F5F5; 
    --text-muted: #808080; 
    --white: #FFFFFF;
    --transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; scroll-behavior: smooth; }

body { 
    background-color: var(--bg-base); 
    background-image: 
        radial-gradient(circle at 50% -20%, #2a0a0a 0%, var(--bg-base) 80%),
        linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.5) 100%);
    background-attachment: fixed;
    color: var(--text-main); 
    display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
}

::-webkit-scrollbar { width: 0px; display: none; } 

/* 🌟 Utilities */
.edit-only { display: none !important; }
body.is-editing .edit-only { display: flex !important; }

/* 🌟 Buttons & Navigation */
.top-btn { 
    position: absolute; top: 20px; padding: 8px 16px; border-radius: 20px; 
    font-size: 12px; transition: var(--transition); z-index: 50; cursor: pointer; 
    display: flex; align-items: center; gap: 8px; font-weight: 500;
    backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
}
.back-to-bakery { left: 20px; color: var(--text-main); background: rgba(255,255,255,0.05); text-decoration: none; }
.back-to-bakery:hover { background: var(--white); color: var(--bg-base); }

.edit-mode-toggle { right: 20px; background: rgba(229, 9, 20, 0.1); color: var(--red-main); border-color: rgba(229, 9, 20, 0.3); }
.edit-mode-toggle.active { background: var(--red-main); color: var(--white); box-shadow: 0 0 20px var(--red-glow); }

header { width: 100%; text-align: center; padding: 80px 20px 30px; position: relative; }
h1 { font-size: 28px; font-weight: 600; text-transform: uppercase; letter-spacing: 4px; color: var(--white); }
h1 span { color: var(--red-main); text-shadow: 0 0 15px var(--red-glow); }

.nav-bar { 
    width: 90%; max-width: 500px; display: flex; justify-content: center; gap: 5px; 
    margin: 25px auto 0; background: rgba(30,30,30,0.6); padding: 5px; 
    border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(15px);
}
.nav-item { 
    padding: 10px 25px; color: var(--text-muted); font-size: 13px; cursor: pointer; 
    border-radius: 25px; transition: var(--transition); display: flex; align-items: center; gap: 8px;
}
.nav-item.active { background: var(--red-main); color: var(--white); box-shadow: 0 5px 15px var(--red-glow); }

/* 🌟 Directory List */
.directory-container { margin-top: 25px; display: grid; gap: 12px; }
.warp-btn { 
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); 
    color: var(--text-main); padding: 16px 20px; border-radius: 12px; 
    text-decoration: none; display: flex; align-items: center; justify-content: space-between; 
    transition: var(--transition);
}
.warp-btn:hover { background: rgba(229, 9, 20, 0.1); border-color: var(--red-main); transform: translateY(-3px); }

/* 🌟 Gang Cards */
.gang-card { 
    background: var(--bg-card); border-radius: 20px; padding: 30px; margin-bottom: 40px; 
    border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
}
.gang-header { border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; margin-bottom: 25px; }
.gang-name { font-size: 22px; color: var(--white); margin-bottom: 8px; letter-spacing: 1px; }
.gang-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

.members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 20px; }
.member-item { position: relative; text-align: center; cursor: pointer; transition: var(--transition); }
.member-img-wrapper { 
    width: 100%; aspect-ratio: 1/1; border-radius: 15px; background: #000; 
    position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}
.member-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
.member-item:hover .member-img-wrapper img { filter: brightness(1.2); }
.member-badge { 
    position: absolute; top: 8px; right: 8px; background: var(--red-main); 
    color: var(--white); font-size: 9px; padding: 3px 8px; border-radius: 5px; 
    z-index: 5; font-weight: 600; text-transform: uppercase;
}

/* 🌟 Edit Controls */
.btn-control { 
    position: absolute; z-index: 40; background: var(--white); 
    color: var(--bg-base); border-radius: 50%; width: 28px; height: 28px; 
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.2s;
}
.btn-control:hover { transform: scale(1.1); background: var(--red-main); color: var(--white); }
.btn-delete { top: -8px; left: -8px; background: #ff3b30; color: white; }
.btn-move-l { bottom: 30%; left: -10px; }
.btn-move-r { bottom: 30%; right: -10px; }

/* 🌟 Modals */
.modal-overlay { 
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; 
    padding: 20px; backdrop-filter: blur(10px); 
}
.modal-content { 
    background: #1c1c1c; width: 100%; max-width: 450px; border-radius: 25px; 
    border: 1px solid rgba(255,255,255,0.1); position: relative; max-height: 90vh; 
    overflow-y: auto; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}

.form-input { 
    width: 100%; padding: 12px 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); 
    border: 1px solid rgba(255,255,255,0.1); color: var(--white); border-radius: 12px; font-size: 14px; 
}
.form-input:focus { border-color: var(--red-main); outline: none; background: rgba(255,255,255,0.08); }

/* 🌟 Preview UI & Stats */
.preview-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
.avatar-preview-box { 
    width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--red-main); 
    background: #000; position: relative; overflow: hidden; box-shadow: 0 0 20px var(--red-glow);
}
.preview-stats { 
    display: flex; gap: 10px; margin-top: 10px; font-size: 10px; 
    color: var(--text-muted); background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 20px;
}
.preview-stats span b { color: var(--white); }

/* 🌟 Profile View (Blur BG) */
.modal-content.profile { padding: 0; overflow: hidden; }
.modal-header-img { width: 100%; height: 200px; background-color: #000; position: relative; overflow: hidden; }
.modal-header-img img { 
    width: 110%; height: 110%; object-fit: cover; opacity: 0.5; 
    filter: blur(20px) saturate(1.5); position: absolute; top: -5%; left: -5%;
}
.modal-body { padding: 30px; margin-top: -60px; position: relative; z-index: 2; }
.modal-avatar-wrapper { 
    width: 100px; height: 100px; border-radius: 20px; border: 3px solid #222; 
    margin-bottom: 15px; background: #111; position: relative; overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}
.modal-name { font-size: 26px; font-weight: 600; color: var(--white); line-height: 1.2; }
.modal-role { color: var(--red-main); font-size: 14px; font-weight: 500; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

.info-item { display: flex; gap: 15px; margin-bottom: 18px; }
.info-icon { 
    width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.03); 
    display: flex; align-items: center; justify-content: center; color: var(--red-main); flex-shrink: 0;
}
.info-text-box .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.info-text-box .val { font-size: 14px; color: var(--text-main); margin-top: 2px; }

</style>
</head>
<body>

  <a href="index.html" class="top-btn back-to-bakery">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Bakery
  </a>
  
  <button class="top-btn edit-mode-toggle" id="editToggleBtn" onclick="toggleEditMode()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Edit Mode
  </button>

  <header>
    <h1>SuperB<span>Butter</span></h1>
    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchTab('setting', this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Setting
        </div>
        <div class="nav-item" onclick="switchTab('gangs', this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg> Factions
        </div>
    </nav>
  </header>

  <div class="container">
    <div id="setting" class="page active">
        <div class="gang-card" style="text-align: center;">
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">UNDERGROUND SYNDICATE DATABASE v2.0</p>
            <div id="warp-list" class="directory-container"></div>
        </div>
    </div>

    <div id="gangs" class="page">
        <button class="btn-add-gang edit-only" onclick="openModal('addGangModal')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> Create New Faction
        </button>
        <div id="gangs-container"></div>
    </div>
  </div>

  <div class="modal-overlay" id="profileModal" onclick="closeModal(event, 'profileModal')">
    <div class="modal-content profile" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal(event, 'profileModal', true)">&times;</span>
        <div class="modal-header-img">
            <img id="p-bg-img" src="" alt="blur-bg">
        </div>
        <div class="modal-body">
            <div class="modal-avatar-wrapper">
                <img id="p-avatar" class="modal-avatar" src="" alt="avatar">
                <div id="p-watermark" class="watermark-overlay" style="display: none;"></div>
            </div>
            <h2 id="p-name" class="modal-name"></h2>
            <div id="p-role" class="modal-role"></div>
            
            <div class="info-item">
                <div class="info-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2L12 4.5M10 6.5L3 13.5l2.5 2.5 7-7M21 15.5l-2.5 2.5-4-4 2.5-2.5 4 4z"/></svg></div>
                <div class="info-text-box"><div class="label">Primary Weapon</div><div id="p-weapon" class="val"></div></div>
            </div>
            <div class="info-item">
                <div class="info-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                <div class="info-text-box"><div class="label">Weakness / Secret</div><div id="p-flaw" class="val"></div></div>
            </div>
            <div class="info-item">
                <div class="info-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
                <div class="info-text-box"><div class="label">Personnel Record</div><div id="p-bio" class="val"></div></div>
            </div>
            <div id="p-credit" class="modal-credit"></div>
        </div>
    </div>
  </div>

  <div class="modal-overlay" id="editMemberModal" onclick="closeModal(event, 'editMemberModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal(event, 'editMemberModal', true)">&times;</span>
        <h2 style="margin-bottom: 20px; font-size: 18px; text-align: center;">Personnel Adjustment</h2>
        
        <div class="preview-header">
            <div class="avatar-preview-box">
                <img id="e-preview-img" src="" alt="preview">
                <div id="e-preview-watermark" class="watermark-overlay"></div>
            </div>
            <div class="preview-stats">
                <span>ZOOM: <b id="st-zoom">1.0</b></span> | <span>X: <b id="st-x">50</b>%</span> | <span>Y: <b id="st-y">50</b>%</span>
            </div>
        </div>

        <div class="zoom-slider-container">
            <div class="slider-row">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="range" id="e-zoom-slider" min="1" max="3" step="0.05" value="1" oninput="updatePreviewImageStyle('e')">
            </div>
            <div class="slider-row">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8L22 12L18 16M6 8L2 12L6 16M2 12H22"/></svg>
                <input type="range" id="e-pos-x-slider" min="0" max="100" value="50" oninput="updatePreviewImageStyle('e')">
            </div>
            <div class="slider-row">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6L12 2L16 6M8 18L12 22L16 18M12 2V22"/></svg>
                <input type="range" id="e-pos-y-slider" min="0" max="100" value="50" oninput="updatePreviewImageStyle('e')">
            </div>
        </div>

        <input type="hidden" id="e-old-name">
        <input type="text" id="e-name-input" class="form-input" placeholder="Full Name">
        <div style="display: flex; gap: 10px;">
            <input type="text" id="e-new-role" class="form-input" placeholder="Position">
            <input type="text" id="e-new-badge" class="form-input" placeholder="Rank/Badge">
        </div>
        <input type="text" id="e-new-img" class="form-input" placeholder="Image Link" oninput="updatePreviewImageStyle('e')">
        <label style="display:flex; align-items:center; gap:10px; margin-bottom:15px; font-size:13px; cursor:pointer;">
            <input type="checkbox" id="e-new-watermark" onchange="updatePreviewWatermark('e')"> Apply Protection Seal (Watermark)
        </label>
        <button class="btn-submit" onclick="submitEditMember()">Save Profile Update</button>
    </div>
  </div>

  <div class="modal-overlay" id="addMemberModal" onclick="closeModal(event, 'addMemberModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal(event, 'addMemberModal', true)">&times;</span>
        <h2 style="margin-bottom:15px; font-size:18px;">Recruit New Personnel</h2>
        <input type="text" id="m-name-input" class="form-input" placeholder="Name" oninput="filterCharacters('m')">
        <div id="autocomplete-list-m" class="autocomplete-list"></div>
        <input type="text" id="m-new-img" class="form-input" placeholder="Image URL">
        <button class="btn-submit" onclick="submitNewMember()">Add to Syndicate</button>
    </div>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz7_u5Xd9uXGiBswifeqw5Q0hefHI_ckMJVwHGEFL6SdJJ4FHViQBKNM0OhvT6EnA9DDA/exec";
const WATERMARK_URL = "https://drive.google.com/thumbnail?id=1e3zyO1VT4FCB020UAEmq5fOThW2R38SL&sz=w1000";

let bakeryData = [];
let mafiaData = [];
let isDataLoading = false;

document.addEventListener("DOMContentLoaded", () => {
    loadMafiaData();
    fetchBakeryData();
});

async function loadMafiaData() {
    if (isDataLoading) return;
    isDataLoading = true;
    const container = document.getElementById('gangs-container');
    container.innerHTML = '<div class="loading-text">ACCESSING SECURE SERVER...</div>';
    try {
        const res = await fetch(API_URL + "?sheet=Mafia");
        mafiaData = await res.json();
        renderGangs(mafiaData);
    } catch (e) { container.innerHTML = "CONNECTION FAILED"; }
    finally { isDataLoading = false; }
}

async function fetchBakeryData() {
    try {
        const res = await fetch(API_URL + "?sheet=Bakery");
        bakeryData = await res.json();
    } catch(e) {}
}

function renderGangs(data) {
    const container = document.getElementById('gangs-container');
    const warpList = document.getElementById('warp-list');
    container.innerHTML = ''; warpList.innerHTML = '';

    const gangs = [...new Set(data.filter(i => i && i.Category === 'Gangs').map(i => i.GroupName))];
    
    gangs.forEach((gn, idx) => {
        warpList.innerHTML += `<a href="#" class="warp-btn" onclick="warpToGang(${idx}); return false;">${gn} <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>`;
        
        const rows = data.filter(i => i.GroupName === gn);
        const info = rows.find(i => i.NameMafia === "[GANG_INFO]");
        const mems = rows.filter(i => i.NameMafia !== "[GANG_INFO]");

        let memsHTML = mems.map(i => {
            const name = i.NameMafia.replace(/'/g,"\\'");
            const isWM = String(i.UseWatermark).toUpperCase() === "TRUE";
            const args = `'${formatImageUrl(i.ImageURL)}','${name}','${String(i.Role||"").replace(/'/g,"\\'")}','${String(i.Badge||"").replace(/'/g,"\\'")}','${String(i.Weapon||"").replace(/'/g,"\\'")}','${String(i.Flaw||"").replace(/'/g,"\\'")}','${String(i.Bio||"").replace(/'/g,"\\'").replace(/\n/g,"<br>")}','${String(i.Credit||"").replace(/'/g,"\\'")}','${String(i.CreditLink||"").replace(/'/g,"\\'")}',${isWM},${i.ZoomLevel||1},${i.PosX||50},${i.PosY||50},'${gn.replace(/'/g,"\\'")}','${i.ImageURL}'`;

            return `<div class="member-item" onclick="handleMemberClick(event, ${args})">
                <button class="btn-control edit-only btn-delete" onclick="event.stopPropagation(); deleteMember('${name}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                <button class="btn-control edit-only btn-move-l" onclick="event.stopPropagation(); moveItem('${name}', -1)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg></button>
                <button class="btn-control edit-only btn-move-r" onclick="event.stopPropagation(); moveItem('${name}', 1)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg></button>
                <div class="member-img-wrapper no-save">
                    ${i.Badge ? `<span class="member-badge">${i.Badge}</span>` : ""}
                    <img src="${formatImageUrl(i.ImageURL)}" style="transform: scale(${i.ZoomLevel||1}); transform-origin: ${i.PosX||50}% ${i.PosY||50}%;" onerror="this.src='https://via.placeholder.com/150/111/C91818?text=?'">
                    ${isWM ? `<div class="watermark-overlay" style="background-image: url('${WATERMARK_URL}')"></div>` : ""}
                </div>
                <div class="member-name">${i.NameMafia}</div>
            </div>`;
        }).join('');

        container.innerHTML += `
            <div class="gang-card" id="gang-${idx}">
                <div class="gang-header">
                    <h2 class="gang-name">${gn}</h2>
                    <p class="gang-desc">${info?.GangDesc || ""}</p>
                </div>
                <div class="members-grid">${memsHTML}</div>
                <button class="btn-add-member edit-only" onclick="prepAddMember('${gn.replace(/'/g,"\\'")}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Recruit</button>
            </div>`;
    });
}

function handleMemberClick(e, img, name, role, badge, weapon, flaw, bio, cr, crL, wm, zoom, x, y, gn, rawImg) {
    if (document.body.classList.contains('is-editing')) {
        currentEditingGang = gn;
        document.getElementById('e-old-name').value = name;
        document.getElementById('e-name-input').value = name;
        document.getElementById('e-new-role').value = role;
        document.getElementById('e-new-badge').value = badge;
        document.getElementById('e-new-img').value = rawImg;
        document.getElementById('e-new-watermark').checked = wm;
        document.getElementById('e-zoom-slider').value = zoom;
        document.getElementById('e-pos-x-slider').value = x;
        document.getElementById('e-pos-y-slider').value = y;
        updatePreviewImageStyle('e');
        updatePreviewWatermark('e');
        openModal('editMemberModal');
    } else {
        openProfileModal(img, name, role, weapon, flaw, bio, cr, crL, wm, zoom, x, y);
    }
}

function updatePreviewImageStyle(prefix) {
    const url = document.getElementById(`${prefix}-new-img`).value;
    const zoom = document.getElementById(`${prefix}-zoom-slider`).value;
    const x = document.getElementById(`${prefix}-pos-x-slider`).value;
    const y = document.getElementById(`${prefix}-pos-y-slider`).value;
    
    // 🌟 Update Stats Text 🌟
    if(prefix === 'e') {
        document.getElementById('st-zoom').innerText = parseFloat(zoom).toFixed(2);
        document.getElementById('st-x').innerText = x;
        document.getElementById('st-y').innerText = y;
    }

    const img = document.getElementById(`${prefix}-preview-img`);
    img.src = formatImageUrl(url) || "https://via.placeholder.com/150/111/C91818?text=?";
    img.style.transform = `scale(${zoom})`; 
    img.style.transformOrigin = `${x}% ${y}%`;
}

function openProfileModal(img, n, r, w, f, b, cr, crL, wm, z, x, y) {
    // 🌟 Blur Background Effect 🌟
    const bg = document.getElementById('p-bg-img');
    bg.src = img;
    
    const av = document.getElementById('p-avatar');
    av.src = img;
    av.style.transform = `scale(${z})`;
    av.style.transformOrigin = `${x}% ${y}%`;
    
    const wmk = document.getElementById('p-watermark');
    wmk.style.backgroundImage = `url('${WATERMARK_URL}')`;
    wmk.style.display = wm ? 'block' : 'none';
    
    document.getElementById('p-name').innerText = n;
    document.getElementById('p-role').innerText = r;
    document.getElementById('p-weapon').innerText = w || "UNARMED";
    document.getElementById('p-flaw').innerText = f || "NONE";
    document.getElementById('p-bio').innerHTML = b || "NO DATA AVAILABLE";
    document.getElementById('p-credit').innerHTML = `Artist: ${crL ? `<a href="${crL}" target="_blank">${cr}</a>` : cr}`;
    openModal('profileModal');
}

// [Helpers remain the same]
function formatImageUrl(url) {
    if (!url) return "";
    const driveMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
    return driveMatch ? `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w1000` : url;
}
function updatePreviewWatermark(prefix) {
    const isChecked = document.getElementById(`${prefix}-new-watermark`).checked;
    document.getElementById(`${prefix}-preview-watermark`).style.display = isChecked ? "block" : "none";
}
function switchTab(t, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(t).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    window.scrollTo({ top: 0, behavior: "smooth" });
}
function toggleEditMode() {
    document.body.classList.toggle('is-editing');
    document.getElementById('editToggleBtn').classList.toggle('active');
}
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(e, id, force = false) {
    if (force || e.target.id === id) { document.getElementById(id).style.display = 'none'; }
}

async function sendRequest(p) {
    document.body.style.opacity = "0.6";
    try { await fetch(API_URL, { method: "POST", body: JSON.stringify(p) }); await loadMafiaData(); } catch(e) { alert("ERROR"); }
    document.body.style.opacity = "1";
}
function warpToGang(id) {
    switchTab('gangs', document.querySelectorAll('.nav-item')[1]);
    setTimeout(() => { 
        const el = document.getElementById('gang-' + id);
        if(el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
    }, 200);
}
</script>
